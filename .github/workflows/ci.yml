name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json

      - name: Run tests and generate coverage report
        run: ./gradlew testDebugUnitTest koverXmlReport koverHtmlReport

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: "**/build/reports/kover/**"
          if-no-files-found: warn

      - name: Extract coverage percentage
        id: extract
        run: |
          # Search root aggregate report first, then fall back to any module report
          XML_REPORT=$(find build/reports/kover -name "*.xml" 2>/dev/null | head -1)
          if [ -z "$XML_REPORT" ]; then
            XML_REPORT=$(find . -path "*/build/reports/kover*" -name "*.xml" 2>/dev/null | head -1)
          fi
          if [ -z "$XML_REPORT" ]; then
            echo "::error::No Kover XML coverage report found. Check that koverXmlReportDebug succeeded."
            exit 1
          fi
          echo "Found report at: $XML_REPORT"
          COVERAGE=$(python3 - <<EOF
          import xml.etree.ElementTree as ET
          import sys
          try:
              tree = ET.parse('$XML_REPORT')
              root = tree.getroot()
              for counter in root.findall('counter'):
                  if counter.get('type') == 'INSTRUCTION':
                      missed = int(counter.get('missed'))
                      covered = int(counter.get('covered'))
                      total = missed + covered
                      pct = round((covered / total) * 100) if total > 0 else 0
                      print(pct)
                      sys.exit(0)
              print(0)
          except Exception as e:
              print(f"Error parsing coverage report: {e}", file=sys.stderr)
              sys.exit(1)
          EOF
          )
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Compute badge color
        run: |
          if [ "$COVERAGE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          echo "BADGE_COLOR=$COLOR" >> $GITHUB_ENV

      - name: Update coverage badge in README
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i "s|!\[Coverage\](https://img.shields.io/badge/coverage-[^)]*)|![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${BADGE_COLOR})|g" README.md

      - name: Commit and push updated badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "ci: update coverage badge to ${COVERAGE}% [skip ci]"
          git push

      - name: Enforce coverage threshold
        run: ./gradlew koverVerify
